<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Map method</title>
</head>
<body>
    <script>
        let num = [250, 230, 405, 528, 1230, 1370]
        let discount = num.map(f => f - (f * 10) / 100)

        console.log(num)
        console.log(discount)
    </script>
</body>
</html>
